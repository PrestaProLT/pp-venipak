services:
    _defaults:
        public: true
        autowire: true
        autoconfigure: true

    PrestaShop\Module\PPVenipak\:
        resource: '../src/'
        exclude: '../src/{Api,Carrier,Entity,Form,Hooks,Module}'

    # --- Form Type ---

    prestashop.module.ppvenipak.form.configuration_type:
        class: 'PrestaShop\Module\PPVenipak\Form\ConfigurationFormType'
        parent: 'form.type.translatable.aware'
        tags:
            - { name: form.type }

    # --- Form Data Provider ---

    prestashop.module.ppvenipak.form.configuration_data_provider:
        class: 'PrestaShop\Module\PPVenipak\Form\ConfigurationFormDataProvider'

    # --- Form Handler ---

    prestashop.module.ppvenipak.form.configuration_handler:
        class: 'PrestaShop\PrestaShop\Core\Form\Handler'
        arguments:
            - '@form.factory'
            - '@prestashop.core.hook.dispatcher'
            - '@prestashop.module.ppvenipak.form.configuration_data_provider'
            - 'PrestaShop\Module\PPVenipak\Form\ConfigurationFormType'
            - 'PpVenipakConfiguration'


    # --- Carriers form ---

    prestashop.module.ppvenipak.form.carrier_type:
        class: 'PrestaShop\Module\PPVenipak\Form\CarrierFormType'
        parent: 'form.type.translatable.aware'
        tags:
            - { name: form.type }

    prestashop.module.ppvenipak.form.carrier_data_provider:
        class: 'PrestaShop\Module\PPVenipak\Form\CarrierFormDataProvider'

    prestashop.module.ppvenipak.form.carrier_handler:
        class: 'PrestaShop\PrestaShop\Core\Form\Handler'
        arguments:
            - '@form.factory'
            - '@prestashop.core.hook.dispatcher'
            - '@prestashop.module.ppvenipak.form.carrier_data_provider'
            - 'PrestaShop\Module\PPVenipak\Form\CarrierFormType'
            - 'PpVenipakCarrier'

    # --- Order states form (Venipak pack_status -> PS order state mapping) ---

    prestashop.module.ppvenipak.form.order_states_type:
        class: 'PrestaShop\Module\PPVenipak\Form\OrderStatesFormType'
        parent: 'form.type.translatable.aware'
        tags:
            - { name: form.type }

    prestashop.module.ppvenipak.form.order_states_data_provider:
        class: 'PrestaShop\Module\PPVenipak\Form\OrderStatesFormDataProvider'

    prestashop.module.ppvenipak.form.order_states_handler:
        class: 'PrestaShop\PrestaShop\Core\Form\Handler'
        arguments:
            - '@form.factory'
            - '@prestashop.core.hook.dispatcher'
            - '@prestashop.module.ppvenipak.form.order_states_data_provider'
            - 'PrestaShop\Module\PPVenipak\Form\OrderStatesFormType'
            - 'PpVenipakOrderStates'
